name: Release Binaries

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g., v1.0.0)'
        required: true
        type: string

env:
  PROJECT_PATH: src/CSharpProvider.csproj

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: linux
            arch: x86_64
            runner: ubuntu-latest
            ext: tar.gz
          - rid: linux-arm64
            os: linux
            arch: aarch64
            runner: ubuntu-24.04-arm
            ext: tar.gz
          - rid: osx-x64
            os: darwin
            arch: x86_64
            runner: macos-latest
            ext: tar.gz
          - rid: osx-arm64
            os: darwin
            arch: aarch64
            runner: macos-14
            ext: tar.gz
          - rid: win-x64
            os: windows
            arch: x86_64
            runner: windows-latest
            ext: zip
          - rid: win-arm64
            os: windows
            arch: aarch64
            runner: windows-latest
            ext: zip
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          -c Release
          --self-contained
          -r ${{ matrix.rid }}
          -o publish/

      - name: Create archive (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          cd publish
          tar czf ../c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.tar.gz .
          cd ..
          sha256sum c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.tar.gz > c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256

      - name: Create archive (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path publish/* -DestinationPath c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.zip
          $hash = Get-FileHash -Path c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.zip -Algorithm SHA256
          "$($hash.Hash.ToLower())  c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.zip" | Out-File -FilePath "c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.zip.sha256" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}
            c-sharp-analyzer-provider-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.ext }}.sha256

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums file
        run: |
          cd artifacts
          cat */*.sha256 > ../checksums.txt
          cd ..
          echo "Checksums:"
          cat checksums.txt

      - name: Determine tag name
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: Release ${{ steps.tag.outputs.tag_name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag_name, '-') }}
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.zip
            checksums.txt
          body: |
            ## C# Analyzer Provider ${{ steps.tag.outputs.tag_name }}

            ### Installation

            Download the appropriate binary for your platform:

            #### Linux
            - `c-sharp-analyzer-provider-linux-x86_64.tar.gz` - Linux x86_64 (AMD64)
            - `c-sharp-analyzer-provider-linux-aarch64.tar.gz` - Linux ARM64

            #### macOS
            - `c-sharp-analyzer-provider-darwin-x86_64.tar.gz` - macOS Intel
            - `c-sharp-analyzer-provider-darwin-aarch64.tar.gz` - macOS Apple Silicon (M1/M2)

            #### Windows
            - `c-sharp-analyzer-provider-windows-x86_64.zip` - Windows x86_64 (AMD64)
            - `c-sharp-analyzer-provider-windows-aarch64.zip` - Windows ARM64

            ### Verification

            ```bash
            # Linux/macOS
            sha256sum -c c-sharp-analyzer-provider-<platform>.tar.gz.sha256

            # Windows (PowerShell)
            Get-FileHash c-sharp-analyzer-provider-<platform>.zip -Algorithm SHA256
            ```

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
