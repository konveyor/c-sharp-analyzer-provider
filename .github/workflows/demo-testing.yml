name: Testing

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
    - "main"
    - "release-*"
    - "v*"

jobs:
  # Named integration-tests to match the required status check in branch protection
  integration-tests:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'
      - name: Build
        run: dotnet build src/CSharpProvider.csproj
      - uses: astral-sh/setup-uv@v6
      - name: Install grpcurl
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -sL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.3/grpcurl_1.9.3_windows_x86_64.zip -o grpcurl.zip
            unzip -o grpcurl.zip grpcurl.exe
            echo "$PWD" >> $GITHUB_PATH
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install grpcurl
          else
            curl -sL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.3/grpcurl_1.9.3_linux_x86_64.tar.gz | tar xz grpcurl
            sudo mv grpcurl /usr/local/bin/
          fi
      - name: Run gRPC tests
        shell: bash
        run: |
          uv run tests/test_runner.py setup
          uv run tests/test_runner.py run --provider csharp --verbose \
            --cmd "dotnet run --project src -- --port 9876 --log-file provider.log" \
            --project net8-sample
      - name: Named pipe test
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $provider = Start-Process -NoNewWindow -PassThru dotnet `
            -ArgumentList "run","--project","src","--","--socket","\\.\pipe\csharp-ci-test","--log-file","provider-pipe.log"
          Start-Sleep -Seconds 15
          dotnet run --project tests/PipeTest -- --pipe csharp-ci-test --repo tests/repos/net8-sample --pattern "^System(\..*)?$"
          $exitCode = $LASTEXITCODE
          Stop-Process $provider -Force -ErrorAction SilentlyContinue
          exit $exitCode
      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            provider.log
            provider-pipe.log
            tests/results/

  local-analyzer-integration-test:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: set-tag
        run: |
          echo "image_tag=${{ github.run_id }}-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build c-sharp-provider-image
        uses: shawn-hurley/ci/build-image@main
        with:
          repo: ${{ github.repository }}
          checked_out: true
          image_name: quay.io/konveyor/c-sharp-provider
          image_tag: ${{ steps.set-tag.outputs.image_tag }}
          dockerfile_path: Dockerfile
          build_context: .

      - name: Smoke test provider
        shell: bash
        run: |
          CONTAINER_USER=$(id -u)
          podman volume create test-data
          podman run --rm --user ${CONTAINER_USER}:0 -v test-data:/target:U,z -v $(pwd)/testdata:/src/:U,z --entrypoint=cp alpine -a /src/. /target/
          podman run --name c-sharp -d --user ${CONTAINER_USER}:0 \
            -p 14651:14651 \
            -v test-data:/analyzer-lsp/examples:U,z \
            quay.io/konveyor/c-sharp-provider:${{ steps.set-tag.outputs.image_tag }} \
            --port 14651
          echo "Waiting for provider to start..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null http://127.0.0.1:14651 2>/dev/null || \
               bash -c "echo > /dev/tcp/127.0.0.1/14651" 2>/dev/null; then
              echo "Provider is ready."
              break
            fi
            if ! podman ps --filter name=c-sharp --format "{{.ID}}" | grep -q .; then
              echo "ERROR: Container exited unexpectedly."
              podman logs c-sharp
              exit 1
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Provider did not start in time."
              podman logs c-sharp
              exit 1
            fi
            sleep 1
          done
          podman stop c-sharp
          podman rm c-sharp

  run-analyzer-tests:
    runs-on: ubuntu-latest
    needs: local-analyzer-integration-test
    steps:
      - name: download built image
        uses: actions/download-artifact@v5
        with:
          pattern: "**-${{ needs.local-analyzer-integration-test.outputs.image-tag }}"
          path: "/tmp/images"

      - name: Load images into podman
        run: |
          for image in $(find /tmp/images -type f -name "*.tar"); do
            echo "Loading image: ${image}"
            podman load -i "${image}"
          done
          echo "Loaded images:"
          podman images
          rm -rf /tmp/images

      - uses: actions/checkout@v6
        with:
          repository: konveyor/analyzer-lsp
          ref: ${{ github.base_ref }}

      - name: run analyzer demo image
        env:
          IMG_C_SHARP_PROVIDER: quay.io/konveyor/c-sharp-provider:${{ needs.local-analyzer-integration-test.outputs.image-tag }}
          IMG_JAVA_PROVIDER: quay.io/konveyor/java-external-provider:latest
          IMG_GO_PROVIDER: quay.io/konveyor/go-external-provider:latest
          IMG_PYTHON_PROVIDER: quay.io/konveyor/python-external-provider:latest
          IMG_NODE_PROVIDER: quay.io/konveyor/nodejs-external-provider:latest
          IMG_YQ_PROVIDER: quay.io/konveyor/yq-external-provider:latest
          IMG_ANALYZER: quay.io/konveyor/analyzer-lsp:latest
        run : |
          make run-external-providers-pod USER_ID="0:0" MOUNT_OPT=":z"
          make run-demo-image USER_ID="0:0" MOUNT_OPT=":z"

      - name: install yq for testing
        run: go install github.com/mikefarah/yq/v4@latest
